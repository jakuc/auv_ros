mezzo_navi:
  velocity_controller:
    # Inner loop: błąd prędkości [m/s, rad/s] → wrench [N, N·m] w układzie ciała
    # Uruchamiany na companion computer (RT Linux), ~50 Hz

    x:
      kp: 15.0
      ki:  1.0
      kd:  3.0
      max_integral: 20.0
      max_output:   30.0   # [N]

    y:
      kp: 15.0
      ki:  1.0
      kd:  3.0
      max_integral: 20.0
      max_output:   30.0

    z:
      kp: 20.0
      ki:  5.0
      kd:  5.0
      max_integral: 20.0
      max_output:   30.0
      # Preset kompensujący nadmiarowy wypór od pierwszego kroku.
      # preset_integral = -B_excess / ki = -(0.2 kg × 9.81 m/s²) / 5.0
      preset_integral: -0.3924

    roll_damp:
      kp: 3.0
      kd: 1.0
      max_output: 10.0   # [N·m]

    pitch_damp:
      kp: 3.0
      kd: 1.0
      max_output: 10.0

    yaw:
      kp:  5.0
      ki:  0.5
      kd:  2.0
      max_integral: 10.0
      max_output:   20.0
