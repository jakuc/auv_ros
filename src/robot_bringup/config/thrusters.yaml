thrusters:
  count: 6

  limits:
    # T200 at 16V: ~37 N fwd, ~24 N rev. Conservative limits.
    min_thrust: -30.0   # [N]
    max_thrust:  30.0   # [N]

  # Body-frame geometry: X-front, Y-left, Z-up (ENU / Isaac Sim convention)
  # Directions derived from URDF thrusters.xacro (rpy + thrust axis sign).
  geometry:
    - id: 0                                     # T1 — front-right, diagonal
      position:  [ 0.1355, -0.1,    -0.0725]   # [m]
      direction: [ 0.7071,  0.7071,  0.0   ]   # unit vector in body frame

    - id: 1                                     # T2 — front-left, diagonal
      position:  [ 0.1355,  0.1,    -0.0725]
      direction: [ 0.7071, -0.7071,  0.0   ]

    - id: 2                                     # T3 — rear-right, diagonal
      position:  [-0.1475, -0.1,    -0.0725]
      direction: [ 0.7071, -0.7071,  0.0   ]

    - id: 3                                     # T4 — rear-left, diagonal
      position:  [-0.1475,  0.1,    -0.0725]
      direction: [ 0.7071,  0.7071,  0.0   ]

    - id: 4                                     # T5 — port vertical, thrust +Z (up)
      position:  [ 0.0025, -0.1105, -0.005 ]
      direction: [ 0.0,     0.0,     1.0   ]

    - id: 5                                     # T6 — starboard vertical, thrust -Z (down)
      position:  [ 0.0025,  0.1105, -0.005 ]
      direction: [ 0.0,     0.0,    -1.0   ]
